<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Youtube Moderator | Premium Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dark-mode">
    <div class="background-glass"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-shield-halved"></i>
                <span>TCD</span>
            </div>
            <nav>
                <div class="nav-item active" data-tab="moderation">
                    <i class="fas fa-comments"></i> Kiểm duyệt
                </div>
                <div class="nav-item" data-tab="analytics">
                    <i class="fas fa-chart-line"></i> Thống kê
                </div>
                <div class="nav-item">
                    <i class="fas fa-cog"></i> Cài đặt
                </div>
            </nav>
            <div class="user-profile">
                <div class="avatar-glow"></div>
                <img src="https://ui-avatars.com/api/?name=Admin&background=random" alt="Avatar">
                <div class="user-info">
                    <span class="user-name">Quản trị viên</span>
                    <span class="user-status">Online</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-container">
                    <select id="scan-type" class="glow-input" style="width: 140px; margin-right: 10px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 10px; font-family: inherit;">
                        <option value="video" style="color: black;">Video ID</option>
                        <option value="channel" style="color: black;">Channel ID</option>
                    </select>
                    <i class="fas fa-link"></i>
                    <input type="text" id="video-id-input" placeholder="Nhập ID YouTube (ví dụ: cxdU2ciJUUQ)...">
                    <button id="fetch-btn" class="glow-button">Quét</button>
                </div>
                <!-- Progress Bar UI (Hidden by default) -->
                <div id="progress-container" class="hidden" style="width: 100%; margin-top: 15px;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 5px;">
                        <span id="progress-message">Đang khởi tạo...</span>
                        <span id="progress-count">0</span>
                    </div>
                    <div class="confidence-bar-container" style="height: 8px; background: rgba(255,255,255,0.1);">
                        <div id="progress-bar" class="confidence-bar" style="width: 0%; background: var(--accent);"></div>
                    </div>
                </div>
                <div class="stats-mini">
                    <div class="stat-badge">
                        <span class="label">Tổng số:</span>
                        <span id="stat-total" class="value">0</span>
                    </div>
                    <div class="stat-badge toxic">
                        <span class="label">Toxic:</span>
                        <span id="stat-toxic" class="value">0</span>
                    </div>
                </div>
            </header>

            <section class="comment-section">
                <div class="section-header">
                    <h2>Lọc bình luận</h2>
                    <div class="actions">
                        <button id="bulk-delete-btn" class="action-btn delete-btn hidden">
                            <i class="fas fa-biohazard"></i> Xóa tất cả Toxic
                        </button>
                        <div class="filters">
                            <button class="filter-btn active" data-filter="all">Tất cả</button>
                            <button class="filter-btn" data-filter="toxic">Toxic</button>
                            <button class="filter-btn" data-filter="clean">Sạch</button>
                        </div>
                    </div>
                </div>

                <div class="advanced-filters">
                    <div class="filter-group search">
                        <i class="fas fa-search"></i>
                        <input type="text" id="keyword-search" placeholder="Lọc theo từ khóa...">
                    </div>

                </div>

                <div id="comment-list" class="comment-grid">
                    <!-- Comment Cards will be injected here -->
                    <div class="empty-state">
                        <i class="fas fa-robot"></i>
                        <p>Nhập Video ID và nhấn Quét để bắt đầu phân tích AI</p>
                    </div>
                </div>

                <!-- Pagination Controls -->
                <div id="pagination-controls" class="hidden" style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px;">
                    <button id="prev-page-btn" class="glow-button" style="padding: 8px 15px; font-size: 0.9em;" disabled><i class="fas fa-chevron-left"></i> Trang trước</button>
                    <span id="page-info" style="font-weight: bold; min-width: 100px; text-align: center;">Trang 1 / 1</span>
                    <button id="next-page-btn" class="glow-button" style="padding: 8px 15px; font-size: 0.9em;" disabled>Trang sau <i class="fas fa-chevron-right"></i></button>
                </div>
            </section>

            <!-- Analytics Section -->
            <section id="analytics-section" class="analytics-section hidden">
                <div class="section-header">
                    <h2>Thống kê Tổng quan</h2>
                    <div class="actions">
                        <button id="export-btn" class="glow-button" style="padding: 8px 15px; font-size: 0.9em;">
                            <i class="fas fa-download"></i> Xuất dữ liệu CSV
                        </button>
                    </div>
                </div>
                <div class="charts-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                    <div class="chart-card" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
                        <h3 style="margin-bottom: 15px; text-align: center;">Tỉ lệ Bình luận</h3>
                        <canvas id="pieChart"></canvas>
                    </div>
                    <div class="chart-card" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
                        <h3 style="margin-bottom: 15px; text-align: center;">Xu hướng theo ngày</h3>
                        <canvas id="lineChart"></canvas>
                    </div>
                    <div class="chart-card" style="grid-column: 1 / -1; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
                        <h3 style="margin-bottom: 15px; text-align: center;">Top 10 Người Dùng Toxic Nhất</h3>
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="/static/script.js"></script>
</body>

</html>
